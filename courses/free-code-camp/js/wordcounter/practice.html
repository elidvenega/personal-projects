      function wordCounter(sentence, match) {
        let count = 0;
        for (const word of sentence) {
          if (word === match) {
            count++;
          }
          console.log(
            `Checking ${word} is equal to ${match} | how many times ${count}`,
          );
        }
        return count;
      }
