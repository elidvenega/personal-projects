<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <title>Objects</title>
</head>

<body>

  <script type="text/javascript">
    const obj = {
      arr: ['hello', 'hi', 'Today'],
      arr2: ['great', 'wolfs', 't-rex'],
      // allArr: [...arr, ...arr2]
      output(input1, input2) {
        return `${input1} ${input2}`
      }
    }

    console.log(obj.output(obj.arr, obj.arr2));
  </script>
</body>

</html>
